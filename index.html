<!DOCTYPE html>
<html>
<head>
<title>AI SQLi Scanner</title>
<style>
body { background:#0d1117; color:#00ff9c; font-family:monospace; }
textarea { width:100%; height:100px; background:#161b22; color:white; }
button { background:#238636; color:white; padding:10px; }
.card { border:1px solid #00ff9c; margin:10px; padding:10px; }
</style>
</head>
<body>

<h1>🔥 AI SQL Injection Scanner</h1>

<form method="POST">
<textarea name="targets" placeholder="Enter URLs (one per line)"></textarea>
<br><br>
<button type="submit">Start Scan</button>
</form>

{% if data %}
<h2>📊 Summary</h2>
<p>Total: {{data.total}}</p>
<p>High: {{data.high}}</p>
<p>Medium: {{data.medium}}</p>

<h2>🔍 Details</h2>
{% for r in data.details %}
<div class="card">
<p>URL: {{r.url}}</p>
<p>Payload: {{r.payload}}</p>
<p>Risk: {{r.risk}}</p>
</div>
{% endfor %}
{% endif %}

</body>
</html>
